<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>配置ボード</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
  body, html {
    background: #1e1e1e;
    color: #fff;
    font-family: "Segoe UI", sans-serif;
    padding: 10px;
    margin: 0;
    height: 100%;
    overflow-x: hidden;
    overflow-y: auto;
  }

  h2 { margin-bottom: 10px; font-size: 20px; }

  #loadArea {
    margin-bottom: 10px;
    background: #2a2a2a;
    padding: 10px;
    border-radius: 6px;
    width: 100%;
    max-width: 480px;
    border: 1px solid #444;
  }

  #saveBtn, #sortBtn, #loadBtn, #formationLoadBtn {
    background: #0078ff;
    color: white;
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 8px;
    margin-right: 8px;
    font-size: 14px;
  }

  #status {
    margin-top: 10px;
    background: #2a2a2a;
    padding: 6px 10px;
    border-radius: 4px;
    display: none;
  }

  /* 未配属（6列グリッド） */
  #unassigned {
    background: #2a2a2a;
    border: 2px solid #555;
    border-radius: 6px;
    padding: 6px;
    margin-bottom: 15px;

    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 4px;

    max-height: 300px;
    overflow-y: auto;
  }

  #unassigned h3 {
    grid-column: span 6;
    margin: 0 0 4px 0;
    font-size: 15px;
  }

  /* チーム（3×5の枠を見せる） */
  .zone {
    background: #2a2a2a;
    border: 2px solid #555;
    border-radius: 6px;
    padding: 6px;
    box-sizing: border-box;

    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-auto-rows: 40px;
    gap: 4px;

    min-height: 150px;
  }

  .zone h3 {
    grid-column: span 5;
    margin: 0 0 4px 0;
    font-size: 15px;
  }

  .slot {
    border: 1px dashed #555;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }

  .piece {
    padding: 4px;
    border-radius: 4px;
    cursor: grab;
    font-size: 11px;
    font-weight: bold;
    text-align: center;
    user-select: none;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
  }

  .dragging {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.9;
    width: 120px;
  }
</style>
</head>

<body>

<h2>配置ボード（参加可のメンバーのみ）</h2>

<div id="loadArea">
  <label>読み込む JSON：</label><br>
  <select id="loadSelect" style="margin-top:5px; width:260px;"></select>
  <button id="loadBtn">読み込み</button>

  <br><br>
  <label>編成一覧：</label><br>
  <select id="formationSelect" style="margin-top:5px; width:260px;"></select>
  <button id="formationLoadBtn">編成ロード</button>

  <br><br>
  <button id="sortBtn">未配属を職業ごとに整列</button>
  <button id="saveBtn">編成を保存</button>

  <div id="status"></div>
</div>

<div id="unassigned">
  <h3>未配属（0）</h3>
</div>

<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
  <div class="zone" id="zoneA">
    <h3>チームA（0）</h3>
    <!-- 3×5 = 15枠 -->
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
  </div>
  <div class="zone" id="zoneB">
    <h3>チームB（0）</h3>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
  </div>
  <div class="zone" id="zoneC">
    <h3>チームC（0）</h3>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
  </div>
  <div class="zone" id="zoneD">
    <h3>チームD（0）</h3>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
  </div>
  <div class="zone" id="zoneE">
    <h3>チームE（0）</h3>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
  </div>
  <div class="zone" id="zoneF">
    <h3>チームF（0）</h3>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
  </div>
</div>

<script>
$(function () {

  const jobColors = {
    "ルーンナイト": "#b30000",
    "ロイヤルガード": "#ff4d4d",
    "ウォーロック": "#0033cc",
    "ソーサラー": "#4d79ff",
    "アークビショップ": "#cc9900",
    "修羅": "#ffcc00",
    "レンジャー": "#006600",
    "ミンストレル": "#33cc33",
    "ワンダラー": "#33cc33",
    "ギロチンクロス": "#4d0066",
    "シャドウチェイサー": "#9933cc",
    "ジェネティック": "#0099cc",
    "メカニック": "#66d9ff",
    "ハイパーノービス": "#ffffff"
  };

  const jobOrder = [
    "ルーンナイト","ロイヤルガード","ウォーロック","ソーサラー","アークビショップ",
    "修羅","レンジャー","ミンストレル","ワンダラー","ギロチンクロス",
    "シャドウチェイサー","ジェネティック","メカニック","ハイパーノービス"
  ];

  const zones = ["zoneA","zoneB","zoneC","zoneD","zoneE","zoneF"];

  function updateCounts() {
    const unassignedCount = $("#unassigned .piece").length;
    $("#unassigned h3").text(`未配属（${unassignedCount}）`);

    zones.forEach(id => {
      const count = $("#" + id + " .slot .piece").length;
      $("#" + id + " h3").text(
        $("#" + id + " h3").text().replace(/\（.*?\）/, `（${count}）`)
      );
    });
  }

  async function loadFileList() {
    const res = await fetch("https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data");
    const files = await res.json();

    const list = files
      .filter(f => f.name.startsWith("members-"))
      .map(f => f.name)
      .sort();

    const $sel = $("#loadSelect");
    $sel.empty();
    list.forEach(name => $sel.append(`<option value="${name}">${name}</option>`));
  }

  async function loadSelectedFile() {
    const file = $("#loadSelect").val();
    const res = await fetch(`https://raw.githubusercontent.com/kexekita-create/twitter-to-rox/main/data/${file}`);
    const json = await res.json();

    $(".piece").remove();

    const members = json.members.filter(m => m.join === "可");

    members.forEach(m => {
      const color = jobColors[m.job] || "#888";
      const $piece = $(`
        <div class="piece" data-name="${m.name}" data-job="${m.job}" style="background:${color}">
          ${m.name}
        </div>
      `);
      enableDrag($piece);
      $("#unassigned").append($piece);
    });

    updateCounts();
    showStatus(file + " を読み込みました");
  }

  async function loadFormationList() {
    const res = await fetch("https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data");
    const files = await res.json();

    const list = files
      .filter(f => f.name.startsWith("formation-"))
      .map(f => f.name)
      .sort();

    const $sel = $("#formationSelect");
    $sel.empty();
    list.forEach(name => $sel.append(`<option value="${name}">${name}</option>`));
  }

  async function loadFormation() {
    const file = $("#formationSelect").val();
    const res = await fetch(`https://raw.githubusercontent.com/kexekita-create/twitter-to-rox/main/data/${file}`);
    const json = await res.json();

    $(".piece").remove();

    const formation = json.formation || {};

    Object.keys(formation).forEach(zoneId => {
      formation[zoneId].forEach(m => {
        const color = jobColors[m.job] || "#888";
        const $piece = $(`
          <div class="piece" data-name="${m.name}" data-job="${m.job}" style="background:${color}">
            ${m.name}
          </div>
        `);
        enableDrag($piece);

        if (zoneId === "unassigned") {
          $("#unassigned").append($piece);
        } else {
          const $zone = $("#" + zoneId);
          const $emptySlot = $zone.find(".slot").filter(function () {
            return $(this).children(".piece").length === 0;
          }).first();

          if ($emptySlot.length) {
            $emptySlot.append($piece);
          } else {
            $("#unassigned").append($piece);
          }
        }
      });
    });

    updateCounts();
    showStatus(file + " を読み込みました");
  }

  function enableDrag($piece) {
    let dragging = false;
    let offsetX = 0, offsetY = 0;

    $piece.on("mousedown touchstart", function (e) {
      e.preventDefault();
      dragging = true;

      const clientX = e.clientX || e.originalEvent.touches[0].clientX;
      const clientY = e.clientY || e.originalEvent.touches[0].clientY;

      const rect = this.getBoundingClientRect();
      offsetX = clientX - rect.left;
      offsetY = clientY - rect.top;

      $piece.addClass("dragging");
      movePiece($piece, clientX, clientY);
    });

    $(document).on("mousemove touchmove", function (e) {
      if (!dragging) return;

      const clientX = e.clientX || e.originalEvent.touches[0].clientX;
      const clientY = e.clientY || e.originalEvent.touches[0].clientY;

      movePiece($piece, clientX, clientY);
    });

    $(document).on("mouseup touchend", function (e) {
      if (!dragging) return;
      dragging = false;

      const clientX = e.clientX || (e.originalEvent.changedTouches && e.originalEvent.changedTouches[0].clientX);
      const clientY = e.clientY || (e.originalEvent.changedTouches && e.originalEvent.changedTouches[0].clientY);

      const target = document.elementFromPoint(clientX, clientY);
      const $zone = $(target).closest(".zone, #unassigned, .slot");

      $piece.removeClass("dragging");
      $piece.css({ left: "", top: "" });

      if ($zone.length > 0) {
        if ($zone.attr("id") === "unassigned") {
          $("#unassigned").append($piece);
        } else if ($zone.hasClass("slot")) {
          const $parentZone = $zone.closest(".zone");
          const currentCount = $parentZone.find(".slot .piece").length;

          if (currentCount >= 15 && $zone.children(".piece").length === 0) {
            $("#unassigned").append($piece);
          } else {
            if ($zone.children(".piece").length > 0) {
              const $existing = $zone.children(".piece").first();
              $("#unassigned").append($existing);
            }
            $zone.append($piece);
          }
        } else if ($zone.hasClass("zone")) {
          const $emptySlot = $zone.find(".slot").filter(function () {
            return $(this).children(".piece").length === 0;
          }).first();

          if ($emptySlot.length) {
            $emptySlot.append($piece);
          } else {
            $("#unassigned").append($piece);
          }
        }
      }

      updateCounts();
    });
  }

  function movePiece($el, x, y) {
    $el.css({ left: x - 60 + "px", top: y - 20 + "px" });
  }

  function sortUnassigned() {
    const $zone = $("#unassigned");
    const pieces = $zone.children(".piece").get();

    pieces.sort((a, b) => {
      const jobA = $(a).data("job");
      const jobB = $(b).data("job");
      return jobOrder.indexOf(jobA) - jobOrder.indexOf(jobB);
    });

    pieces.forEach(p => $zone.append(p));
  }

  $("#sortBtn").on("click", function () {
    sortUnassigned();
  });

  async function saveFormation() {
    const formation = { unassigned: [] };

    $("#unassigned .piece").each(function () {
      formation.unassigned.push({
        name: $(this).data("name"),
        job: $(this).data("job")
      });
    });

    zones.forEach(zone => {
      formation[zone] = [];
      $("#" + zone + " .slot .piece").each(function () {
        formation[zone].push({
          name: $(this).data("name"),
          job: $(this).data("job")
        });
      });
    });

    const payload = {
      type: "formation",
      timestamp: new Date().toISOString(),
      formation
    };

    await fetch("https://patient-violet-af9d.k-exe-kita.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    showStatus("編成を保存しました");
  }

  $("#saveBtn").on("click", saveFormation);

  function showStatus(msg) {
    $("#status").text(msg).fadeIn(150);
    setTimeout(() => $("#status").fadeOut(300), 2000);
  }

  loadFileList();
  loadFormationList();
  $("#loadBtn").on("click", loadSelectedFile);
  $("#formationLoadBtn").on("click", loadFormation);

});
</script>

</body>
</html>
