<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>配置ボード</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
  body, html {
    background: #1e1e1e;
    color: #fff;
    font-family: "Segoe UI", sans-serif;
    padding: 10px;
    margin: 0;
    overflow: hidden;
  }

  h2 { margin-bottom: 10px; font-size: 20px; }

  #loadArea {
    margin-bottom: 10px;
    background: #2a2a2a;
    padding: 10px;
    border-radius: 6px;
    width: 100%;
    max-width: 480px;
    border: 1px solid #444;
  }

  #saveBtn, #sortBtn, #loadBtn, #formationLoadBtn {
    background: #0078ff;
    color: white;
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 8px;
    margin-right: 8px;
    font-size: 14px;
  }

  #status {
    margin-top: 10px;
    background: #2a2a2a;
    padding: 6px 10px;
    border-radius: 4px;
    display: none;
  }

  /* 2×3 グリッド */
  #board {
    display: grid !important;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    height: calc(100vh - 220px);
    overflow: hidden;
    box-sizing: border-box;
  }

  .zone {
    background: #2a2a2a;
    border: 2px solid #555;
    border-radius: 6px;
    padding: 6px;
    box-sizing: border-box;

    display: flex;
    flex-direction: column;
    gap: 4px;

    overflow-y: auto;
    overflow-x: hidden;
  }

  .zone h3 {
    margin: 0 0 4px 0;
    font-size: 15px;
  }

  .piece {
    padding: 4px 8px;
    border-radius: 4px;
    cursor: grab;
    font-size: 12px;
    font-weight: bold;
    width: 100%;
    box-sizing: border-box;
    user-select: none;
  }

  .dragging {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.9;
    width: 180px;
  }

  .placeholder {
    height: 22px;
    border: 1px dashed #666;
    border-radius: 4px;
  }
</style>
</head>

<body>

<h2>配置ボード（参加可のメンバーのみ）</h2>

<div id="loadArea">
  <label>読み込む JSON：</label><br>
  <select id="loadSelect" style="margin-top:5px; width:260px;"></select>
  <button id="loadBtn">読み込み</button>

  <br><br>
  <label>編成一覧：</label><br>
  <select id="formationSelect" style="margin-top:5px; width:260px;"></select>
  <button id="formationLoadBtn">編成ロード</button>

  <br><br>
  <button id="sortBtn">職業ごとに整列</button>
  <button id="saveBtn">編成を保存</button>

  <div id="status"></div>
</div>

<div id="board">
  <div class="zone" id="zoneA"><h3>チームA（0）</h3></div>
  <div class="zone" id="zoneB"><h3>チームB（0）</h3></div>
  <div class="zone" id="zoneC"><h3>チームC（0）</h3></div>
  <div class="zone" id="zoneD"><h3>チームD（0）</h3></div>
  <div class="zone" id="zoneE"><h3>チームE（0）</h3></div>
  <div class="zone" id="zoneF"><h3>チームF（0）</h3></div>
</div>
