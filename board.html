<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>配置ボード</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
  body, html {
    background: #1e1e1e;
    color: #fff;
    font-family: "Segoe UI", sans-serif;
    padding: 10px;
    margin: 0;
    height: 100%;
    overflow-x: hidden;
    overflow-y: auto;
  }

  h2 { margin-bottom: 10px; font-size: 22px; }

  #loadArea {
    margin-bottom: 10px;
    background: #2a2a2a;
    padding: 12px;
    border-radius: 6px;
    width: 100%;
    max-width: 520px;
    border: 1px solid #444;
    font-size: 16px;
  }

  #saveBtn, #sortBtn, #loadBtn, #formationLoadBtn {
    background: #0078ff;
    color: white;
    padding: 8px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 8px;
    margin-right: 8px;
    font-size: 15px;
  }

  #status {
    margin-top: 10px;
    background: #2a2a2a;
    padding: 8px 12px;
    border-radius: 4px;
    display: none;
    font-size: 15px;
  }

  /* ▼ 未配属（6列グリッド） */
  #unassigned {
    background: #2a2a2a;
    border: 2px solid #555;
    border-radius: 6px;
    padding: 6px;
    margin-bottom: 15px;

    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;

    max-height: 320px;
    overflow-y: auto;
  }

  #unassigned h3 {
    grid-column: span 6;
    margin: 0 0 6px 0;
    font-size: 18px;
  }

  /* ▼ チーム（3×5の枠を見せる） */
  .zone {
    background: #2a2a2a;
    border: 2px solid #555;
    border-radius: 6px;
    padding: 6px;
    box-sizing: border-box;

    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-auto-rows: 48px;
    gap: 6px;

    min-height: 180px;
  }

  .zone h3 {
    grid-column: span 5;
    margin: 0 0 6px 0;
    font-size: 18px;
  }

  .slot {
    border: 1px dashed #555;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }

  .piece {
    padding: 4px;
    border-radius: 4px;
    cursor: grab;
    font-size: 14px;
    font-weight: bold;
    text-align: center;
    user-select: none;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
  }

  .dragging {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.9;
    width: 150px;
    font-size: 16px;
  }
</style>
</head>

<body>

<h2>配置ボード（参加可のメンバーのみ）</h2>

<div id="loadArea">
  <label>読み込む JSON：</label><br>
  <select id="loadSelect" style="margin-top:5px; width:260px; font-size:15px;"></select>
  <button id="loadBtn">読み込み</button>

  <br><br>
  <label>編成一覧：</label><br>
  <select id="formationSelect" style="margin-top:5px; width:260px; font-size:15px;"></select>
  <button id="formationLoadBtn">編成ロード</button>

  <br><br>
  <button id="sortBtn">未配属を職業ごとに整列</button>
  <button id="saveBtn">編成を保存</button>

  <div id="status"></div>
</div>

<!-- ▼ 未配属 -->
<div id="unassigned">
  <h3>未配属（0）</h3>
</div>

<!-- ▼ チーム 2×3 -->
<div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">

  <!-- 15枠 × 6チーム -->
  <script>
    const teamIds = ["A","B","C","D","E","F"];
    document.write(
      teamIds.map(id => `
        <div class="zone" id="zone${id}">
          <h3>チーム${id}（0）</h3>
          ${"<div class='slot'></div>".repeat(15)}
        </div>
      `).join("")
    );
  </script>

</div>

<script>
$(function () {

  /* ▼ 目に優しいダークテーマ職色 */
  const jobColors = {
    "ルーンナイト": "#b30000",
    "ロイヤルガード": "#ff4d4d",

    "ウォーロック": "#0033cc",
    "ソーサラー": "#4d79ff",

    "アークビショップ": "#4a3f2b", // ダークゴールド
    "修羅": "#3a2f1d",             // ダークブラウン

    "レンジャー": "#006600",
    "ミンストレル": "#33cc33",
    "ワンダラー": "#33cc33",

    "ギロチンクロス": "#4d0066",
    "シャドウチェイサー": "#9933cc",

    "ジェネティック": "#0099cc",
    "メカニック": "#66d9ff",

    "ハイパーノービス": "#ffffff"
  };

  const jobOrder = [
    "ルーンナイト","ロイヤルガード","ウォーロック","ソーサラー","アークビショップ",
    "修羅","レンジャー","ミンストレル","ワンダラー","ギロチンクロス",
    "シャドウチェイサー","ジェネティック","メカニック","ハイパーノービス"
  ];

  const zones = ["zoneA","zoneB","zoneC","zoneD","zoneE","zoneF"];

  /* ▼ カウント更新 */
  function updateCounts() {
    $("#unassigned h3").text(`未配属（${$("#unassigned .piece").length}）`);

    zones.forEach(id => {
      const count = $("#" + id + " .slot .piece").length;
      $("#" + id + " h3").text(`チーム${id.replace("zone","")}（${count}）`);
    });
  }

  /* ▼ メンバー一覧ロード */
  async function loadFileList() {
    const res = await fetch("https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data");
    const files = await res.json();

    const list = files
      .filter(f => f.name.startsWith("members-"))
      .map(f => f.name)
      .sort();

    $("#loadSelect").empty().append(
      list.map(n => `<option value="${n}">${n}</option>`)
    );
  }

  /* ▼ メンバー読み込み（未配属に全部入れる） */
  async function loadSelectedFile() {
    const file = $("#loadSelect").val();
    const res = await fetch(`https://raw.githubusercontent.com/kexekita-create/twitter-to-rox/main/data/${file}`);
    const json = await res.json();

    $(".piece").remove();

    json.members.filter(m => m.join === "可").forEach(m => {
      const $p = $(`<div class="piece" data-name="${m.name}" data-job="${m.job}" style="background:${jobColors[m.job] || "#888"}">${m.name}</div>`);
      enableDrag($p);
      $("#unassigned").append($p);
    });

    updateCounts();
    showStatus(file + " を読み込みました");
  }

  /* ▼ 編成一覧ロード */
  async function loadFormationList() {
    const res = await fetch("https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data");
    const files = await res.json();

    const list = files
      .filter(f => f.name.startsWith("formation-"))
      .map(f => f.name)
      .sort();

    $("#formationSelect").empty().append(
      list.map(n => `<option value="${n}">${n}</option>`)
    );
  }

  /* ▼ 編成ロード */
  async function loadFormation() {
    const file = $("#formationSelect").val();
    const res = await fetch(`https://raw.githubusercontent.com/kexekita-create/twitter-to-rox/main/data/${file}`);
    const json = await res.json();

    $(".piece").remove();

    const formation = json.formation || {};

    Object.keys(formation).forEach(zoneId => {
      formation[zoneId].forEach(m => {
        const $p = $(`<div class="piece" data-name="${m.name}" data-job="${m.job}" style="background:${jobColors[m.job] || "#888"}">${m.name}</div>`);
        enableDrag($p);

        if (zoneId === "unassigned") {
          $("#unassigned").append($p);
        } else {
          const $slot = $("#" + zoneId).find(".slot").filter(function () {
            return $(this).children().length === 0;
          }).first();

          if ($slot.length) $slot.append($p);
          else $("#unassigned").append($p);
        }
      });
    });

    updateCounts();
    showStatus(file + " を読み込みました");
  }

  /* ▼ ドラッグ処理 */
  function enableDrag($p) {
    let dragging = false;
    let offsetX = 0, offsetY = 0;

    $p.on("mousedown touchstart", function (e) {
      e.preventDefault();
      dragging = true;

      const x = e.clientX || e.originalEvent.touches[0].clientX;
      const y = e.clientY || e.originalEvent.touches[0].clientY;

      const rect = this.getBoundingClientRect();
      offsetX = x - rect.left;
      offsetY = y - rect.top;

      $p.addClass("dragging");
      movePiece($p, x, y);
    });

    $(document).on("mousemove touchmove", function (e) {
      if (!dragging) return;

      const x = e.clientX || e.originalEvent.touches[0].clientX;
      const y = e.clientY || e.originalEvent.touches[0].clientY;

      movePiece($p, x, y);
    });

    $(document).on("mouseup touchend", function (e) {
      if (!dragging) return;
      dragging = false;

      const x = e.clientX || (e.originalEvent.changedTouches && e.originalEvent.changedTouches[0].clientX);
      const y = e.clientY || (e.originalEvent.changedTouches && e.originalEvent.changedTouches[0].clientY);

      const target = document.elementFromPoint(x, y);
      const $slot = $(target).closest(".slot");
      const $zone = $(target).closest(".zone");
      const $unassigned = $(target).closest("#unassigned");

      $p.removeClass("dragging").css({ left: "", top: "" });

      if ($unassigned.length) {
        $("#unassigned").append($p);
      }
      else if ($slot.length) {
        const $parentZone = $slot.closest(".zone");
        const count = $parentZone.find(".slot .piece").length;

        if (count >= 15 && $slot.children().length === 0) {
          $("#unassigned").append($p);
        } else {
          if ($slot.children().length > 0) {
            $("#unassigned").append($slot.children().first());
          }
          $slot.append($p);
        }
      }
      else if ($zone.length) {
        const $empty = $zone.find(".slot").filter(function () {
          return $(this).children().length === 0;
        }).first();

        if ($empty.length) $empty.append($p);
        else $("#unassigned").append($p);
      }
      else {
        $("#unassigned").append($p);
      }

      updateCounts();
    });
  }

  function movePiece($el, x, y) {
    $el.css({ left: x - 75 + "px", top: y - 24 + "px" });
  }

  /* ▼ 未配属だけ整列 */
  function sortUnassigned() {
    const pieces = $("#unassigned .piece").get();

    pieces.sort((a, b) => {
      const jobA = $(a).data("job");
      const jobB = $(b).data("job");
      return jobOrder.indexOf(jobA) - jobOrder.indexOf(jobB);
    });

    pieces.forEach(p => $("#unassigned").append(p));
  }

  $("#sortBtn").on("click", sortUnassigned);

  /* ▼ 保存 */
  async function saveFormation() {
    const formation = { unassigned: [] };

    $("#unassigned .piece").each(function () {
      formation.unassigned.push({
        name: $(this).data("name"),
        job: $(this).data("job")
      });
    });

    zones.forEach(zone => {
      formation[zone] = [];
      $("#" + zone + " .slot .piece").each(function () {
        formation[zone].push({
          name: $(this).data("name"),
          job: $(this).data("job")
        });
      });
    });

    await fetch("https://patient-violet-af9d.k-exe-kita.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        type: "formation",
        timestamp: new Date().toISOString(),
        formation
      })
    });

    showStatus("編成を保存しました");
  }

  $("#saveBtn").on("click", saveFormation);

  function showStatus(msg) {
    $("#status").text(msg).fadeIn(150);
    setTimeout(() => $("#status").fadeOut(300), 2000);
  }

  loadFileList();
  loadFormationList();
  $("#loadBtn").on("click", loadSelectedFile);
  $("#formationLoadBtn").on("click", loadFormation);

});
</script>

</body>
</html>
