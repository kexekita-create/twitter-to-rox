<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>配置ボード</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
  body, html {
    background: #1e1e1e;
    color: #fff;
    font-family: "Segoe UI", sans-serif;
    padding: 10px;
    margin: 0;
    height: 100%;
    overflow-x: hidden;
    overflow-y: auto; /* ← これが重要（読み込み不具合の原因だった） */
  }

  h2 { margin-bottom: 10px; font-size: 20px; }

  #loadArea {
    margin-bottom: 10px;
    background: #2a2a2a;
    padding: 10px;
    border-radius: 6px;
    width: 100%;
    max-width: 480px;
    border: 1px solid #444;
  }

  #saveBtn, #sortBtn, #loadBtn, #formationLoadBtn {
    background: #0078ff;
    color: white;
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 8px;
    margin-right: 8px;
    font-size: 14px;
  }

  #status {
    margin-top: 10px;
    background: #2a2a2a;
    padding: 6px 10px;
    border-radius: 4px;
    display: none;
  }

  /* ▼ 2×3 グリッド + スクロール */
  #board {
    display: grid !important;
    grid-template-columns: 1fr 1fr;
    grid-auto-rows: minmax(150px, auto);
    gap: 10px;
    width: 100%;
    height: calc(100vh - 220px);
    overflow-y: auto;
    overflow-x: hidden;
    box-sizing: border-box;
    padding-right: 5px;
  }

  .zone {
    background: #2a2a2a;
    border: 2px solid #555;
    border-radius: 6px;
    padding: 6px;
    box-sizing: border-box;

    display: flex;
    flex-direction: column;
    gap: 4px;

    overflow-y: auto;
    overflow-x: hidden;
    min-height: 150px;
  }

  .zone h3 {
    margin: 0 0 4px 0;
    font-size: 15px;
  }

  .piece {
    padding: 4px 8px;
    border-radius: 4px;
    cursor: grab;
    font-size: 12px;
    font-weight: bold;
    width: 100%;
    box-sizing: border-box;
    user-select: none;
  }

  .dragging {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.9;
    width: 180px;
  }

  .placeholder {
    height: 22px;
    border: 1px dashed #666;
    border-radius: 4px;
  }
</style>
</head>

<body>

<h2>配置ボード（参加可のメンバーのみ）</h2>

<div id="loadArea">
  <label>読み込む JSON：</label><br>
  <select id="loadSelect" style="margin-top:5px; width:260px;"></select>
  <button id="loadBtn">読み込み</button>

  <br><br>
  <label>編成一覧：</label><br>
  <select id="formationSelect" style="margin-top:5px; width:260px;"></select>
  <button id="formationLoadBtn">編成ロード</button>

  <br><br>
  <button id="sortBtn">職業ごとに整列</button>
  <button id="saveBtn">編成を保存</button>

  <div id="status"></div>
</div>

<div id="board">
  <div class="zone" id="zoneA"><h3>チームA（0）</h3></div>
  <div class="zone" id="zoneB"><h3>チームB（0）</h3></div>
  <div class="zone" id="zoneC"><h3>チームC（0）</h3></div>
  <div class="zone" id="zoneD"><h3>チームD（0）</h3></div>
  <div class="zone" id="zoneE"><h3>チームE（0）</h3></div>
  <div class="zone" id="zoneF"><h3>チームF（0）</h3></div>
</div>

<script>
$(function () {

  /* ▼ 指定通りの濃淡カラー */
  const jobColors = {
    "ルーンナイト":      "#b30000",
    "ロイヤルガード":    "#ff4d4d",
    "ウォーロック":      "#0033cc",
    "ソーサラー":        "#4d79ff",
    "アークビショップ":  "#cc9900",
    "修羅":              "#ffcc00",
    "レンジャー":        "#006600",
    "ミンストレル":      "#33cc33",
    "ワンダラー":        "#33cc33",
    "ギロチンクロス":    "#4d0066",
    "シャドウチェイサー": "#9933cc",
    "ジェネティック":    "#0099cc",
    "メカニック":        "#66d9ff",
    "ハイパーノービス":  "#ffffff"
  };

  const zones = ["zoneA","zoneB","zoneC","zoneD","zoneE","zoneF"];

  /* ▼ 人数カウント更新 */
  function updateCounts() {
    zones.forEach(id => {
      const count = $("#" + id + " .piece").length;
      $("#" + id + " h3").text(
        $("#" + id + " h3").text().replace(/\（.*?\）/, `（${count}）`)
      );
    });
  }

  /* ▼ メンバーJSON一覧 */
  async function loadFileList() {
    const owner = "kexekita-create";
    const repo  = "twitter-to-rox";

    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data`);
    if (!res.ok) return;

    const files = await res.json();
    const list = files
      .filter(f => f.name.startsWith("members-") && f.name.endsWith(".json"))
      .map(f => f.name)
      .sort();

    const $sel = $("#loadSelect");
    $sel.empty();
    list.forEach(name => {
      $sel.append(`<option value="${name}">${name}</option>`);
    });
  }

  /* ▼ メンバー読み込み */
  async function loadSelectedFile() {
    const owner = "kexekita-create";
    const repo  = "twitter-to-rox";
    const file = $("#loadSelect").val();
    if (!file) return;

    const res = await fetch(`https://raw.githubusercontent.com/${owner}/${repo}/main/data/${file}`);
    const json = await res.json();

    $(".zone .piece").remove();

    const members = json.members.filter(m => m.join === "可");

    members.forEach(m => {
      const color = jobColors[m.job] || "#888";

      const $piece = $(`
        <div class="piece" data-name="${m.name}" data-job="${m.job}" style="background:${color}">
          ${m.name}（${m.job}）
        </div>
      `);

      enableDrag($piece);
      $("#zoneA").append($piece);
    });

    updateCounts();
    showStatus(file + " を読み込みました", false);
  }

  /* ▼ 編成一覧 */
  async function loadFormationList() {
    const owner = "kexekita-create";
    const repo  = "twitter-to-rox";

    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data`);
    if (!res.ok) return;

    const files = await res.json();
    const list = files
      .filter(f => f.name.startsWith("formation-") && f.name.endsWith(".json"))
      .map(f => f.name)
      .sort();

    const $sel = $("#formationSelect");
    $sel.empty();
    list.forEach(name => {
      $sel.append(`<option value="${name}">${name}</option>`);
    });
  }

  /* ▼ 編成ロード */
  async function loadFormation() {
    const owner = "kexekita-create";
    const repo  = "twitter-to-rox";
    const file  = $("#formationSelect").val();
    if (!file) return;

    const res = await fetch(`https://raw.githubusercontent.com/${owner}/${repo}/main/data/${file}`);
    const json = await res.json();

    zones.forEach(z => $("#" + z + " .piece").remove());

    const formation = json.formation || {};

    Object.keys(formation).forEach(zoneId => {
      const members = formation[zoneId];
      members.forEach(m => {
        const color = jobColors[m.job] || "#888";
        const $piece = $(`
          <div class="piece" data-name="${m.name}" data-job="${m.job}" style="background:${color}">
            ${m.name}（${m.job}）
          </div>
        `);
        enableDrag($piece);
        $("#" + zoneId).append($piece);
      });
    });

    updateCounts();
    showStatus(file + " を読み込みました", false);
  }

  /* ▼ ドラッグ処理（PC + スマホ対応） */
  function enableDrag($piece) {
    let dragging = false;
    let offsetX = 0;
    let offsetY = 0;
    let $placeholder = null;
    let $originZone = null;

    $piece.on("mousedown touchstart", function (e) {
      e.preventDefault();

      dragging = true;
      $originZone = $(this).closest(".zone");

      const clientX = e.clientX || e.originalEvent.touches[0].clientX;
      const clientY = e.clientY || e.originalEvent.touches[0].clientY;

      const rect = this.getBoundingClientRect();
      offsetX = clientX - rect.left;
      offsetY = clientY - rect.top;

      $placeholder = $("<div class='placeholder'></div>");
      $placeholder.height(rect.height);
      $(this).after($placeholder);

      $(this).addClass("dragging");
      movePiece($(this), clientX, clientY);
    });

    $(document).on("mousemove touchmove", function (e) {
      if (!dragging) return;

      const clientX = e.clientX || e.originalEvent.touches[0].clientX;
      const clientY = e.clientY || e.originalEvent.touches[0].clientY;

      movePiece($piece, clientX, clientY);
    });

    $(document).on("mouseup touchend", function (e) {
      if (!dragging) return;
      dragging = false;

      const clientX = e.clientX || (e.originalEvent.changedTouches && e.originalEvent.changedTouches[0].clientX);
      const clientY = e.clientY || (e.originalEvent.changedTouches && e.originalEvent.changedTouches[0].clientY);

      const target = document.elementFromPoint(clientX, clientY);
      const $zone = $(target).closest(".zone");

      if ($zone.length > 0) {
        $zone.append($piece);
      } else if ($originZone) {
        $originZone.append($piece);
      }

      $piece.removeClass("dragging");
      $piece.css({ left: "", top: "" });

      if ($placeholder) $placeholder.remove();

      updateCounts();
    });
  }

  function movePiece($el, clientX, clientY) {
    $el.css({
      left: (clientX - offsetX) + "px",
      top:  (clientY - offsetY) + "px"
    });
  }

  /* ▼ 編成保存 */
  async function saveFormation() {
    const formation = {};

    zones.forEach(zone => {
      formation[zone] = [];
      $("#" + zone + " .piece").each(function () {
        formation[zone].push({
          name: $(this).data("name"),
          job: $(this).data("job")
        });
      });
    });

    const payload = {
      type: "formation",
      timestamp: new Date().toISOString(),
      formation
    };

    await fetch("https://patient-violet-af9d.k-exe-kita.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
  }

  $("#saveBtn").on("click", async function () {
    try {
      await saveFormation();
      showStatus("編成を保存しました", false);
      await loadFormationList();
    } catch (e) {
      showStatus("保存に失敗: " + e.message, true);
    }
  });

  function showStatus(msg, isError) {
    const $s = $("#status");
    $s.text(msg)
      .css("background", isError ? "#a33" : "#2a2a2a")
      .fadeIn(150);
    setTimeout(() => $s.fadeOut(300), 3000);
  }

  /* ▼ 初期化 */
  loadFileList();
  loadFormationList();
  $("#loadBtn").on("click", loadSelectedFile);
  $("#formationLoadBtn").on("click", loadFormation);

});
</script>

</body>
</html>
