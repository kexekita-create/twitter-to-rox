<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>参加確認一覧</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body{background:#1e1e1e;color:#fff;font-family:"Segoe UI";padding:20px}
h2{margin-bottom:20px}
table{border-collapse:collapse;margin-top:20px}
th,td{
  border:1px solid #555;padding:6px 10px;text-align:center;
  min-width:120px;
}
td.note{background:#663300;color:#fff;cursor:pointer}
button{
  margin-top:10px;padding:8px 16px;border:none;border-radius:6px;
  background:#0078ff;color:#fff;font-size:15px;cursor:pointer;
}
#calendar{margin-top:10px}
#status{margin-top:10px;background:#333;padding:10px;border-radius:6px;display:none}
</style>
</head>

<body>

<h2>参加確認一覧</h2>

<!-- 日付追加 -->
<label>日付追加（カレンダー）</label>
<input type="date" id="dateInput">
<button id="addDateBtn">追加</button>

<div id="status"></div>

<!-- 一覧表 -->
<div id="tableArea"></div>

<script>
$(async function(){

  /* -----------------------------
     日付読み込み
     ----------------------------- */
  async function loadDates(){
    const res = await fetch("https://raw.githubusercontent.com/kexekita-create/twitter-to-rox/main/data/dates.json");
    return await res.json();
  }

  /* -----------------------------
     参加者読み込み
     ----------------------------- */
  async function loadMembers(){
    const res = await fetch("https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data");
    const files = await res.json();
    const memberFile = files.find(f => /^members-/i.test(f.name));
    return await (await fetch(memberFile.download_url)).json();
  }

/* -----------------------------
     参加連絡一覧読み込み（複数人対応版）
     ----------------------------- */
async function loadEntries(){
  const res = await fetch("https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data");
  const files = await res.json();

  const entryFiles = files.filter(f => /^entry-/i.test(f.name));

  const allEntries = [];

  for(const f of entryFiles){
    const j = await (await fetch(f.download_url)).json();

    // ★ entries 配列を展開して追加
    if (Array.isArray(j.entries)) {
      j.entries.forEach(e => {
        allEntries.push({
          name: e.name,
          status: e.status,
          note: e.note,
          timestamp: e.timestamp,
          date: f.name.replace("entry-", "").replace(".json", "")
        });
      });
    }
  }

  return allEntries;
}


  /* -----------------------------
     日付追加（修正版）
     ----------------------------- */
  $("#addDateBtn").on("click", async ()=>{
    const d = $("#dateInput").val();
    if(!d){
      $("#status").text("日付を選択してください").show();
      return;
    }

    const res = await fetch("https://patient-violet-af9d.k-exe-kita.workers.dev",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        project: "twitter",   // ← これが必須だった
        type: "dates",
        date: d
      })
    });

    const text = await res.text();
    $("#status").text(text).show();

    renderTable();
  });

  /* -----------------------------
     一覧表描画
     ----------------------------- */
  async function renderTable(){

    const datesJson = await loadDates();
    const membersJson = await loadMembers();
    const entries = await loadEntries();

    let html = "<table><tr><th>メンバー</th>";

    datesJson.dates.forEach(d=>{
      html += `<th>${d}</th>`;
    });
    html += "</tr>";

    membersJson.members.forEach(m=>{
      html += `<tr><td>${m.name}</td>`;

      datesJson.dates.forEach(d=>{
        const e = entries.find(x => x.name===m.name && x.date===d);

        if(!e){
          html += "<td>-</td>";
        }else{
          if(e.note){
            html += `<td class="note" title="${e.note}">${e.status}</td>`;
          }else{
            html += `<td>${e.status}</td>`;
          }
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    $("#tableArea").html(html);
  }

  /* 初期表示 */
  renderTable();

});
</script>

</body>
</html>
