<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>参加確認一覧</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body{background:#1e1e1e;color:#fff;font-family:"Segoe UI";padding:20px}
h2{margin-bottom:20px}
table{border-collapse:collapse;margin-top:20px}
th,td{
  border:1px solid #555;padding:6px 10px;text-align:center;
  min-width:120px;
}
td.note{background:#663300;color:#fff;cursor:pointer}
button{
  margin-top:10px;padding:8px 16px;border:none;border-radius:6px;
  background:#0078ff;color:#fff;font-size:15px;cursor:pointer;
}
#status{margin-top:10px;background:#333;padding:10px;border-radius:6px;display:none}
</style>
</head>

<body>

<h2>参加確認一覧</h2>

<label>日付追加（カレンダー）</label>
<input type="date" id="dateInput">
<button id="addDateBtn">追加</button>

<div id="status"></div>

<div id="tableArea"></div>

<script>
$(async function(){

  /* -----------------------------
     最新 members を GitHub API で読み込む（高速）
     ----------------------------- */
  async function loadMembers(){
    const apiUrl =
      "https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data";

    const files = await (await fetch(apiUrl)).json();

    const memberFiles = files.filter(f => /^members-.*\.json$/i.test(f.name));

    memberFiles.sort((a,b)=> a.name < b.name ? 1 : -1);

    const latest = memberFiles[0];

    const info = await (await fetch(
      `https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data/${latest.name}`
    )).json();

    return await (await fetch(info.download_url)).json();
  }

  /* -----------------------------
     日付読み込み（GitHub API）
     ----------------------------- */
  async function loadDates(){
    const info = await (await fetch(
      "https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data/dates.json"
    )).json();

    return await (await fetch(info.download_url)).json();
  }

  /* -----------------------------
     entry_v001 の一覧読み込み（GitHub API）
     ----------------------------- */
  async function loadEntries(){

    const apiUrl =
      "https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data/entry";

    const files = await (await fetch(apiUrl)).json();

    const entryFiles = files.filter(f => /^entry-.*_v001\.json$/i.test(f.name));

    const allEntries = [];

    for(const f of entryFiles){

      const info = await (await fetch(
        `https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data/entry/${f.name}`
      )).json();

      const j = await (await fetch(info.download_url)).json();

      if (Array.isArray(j.entries)) {
        j.entries.forEach(e => {
          allEntries.push({
            name: e.name,
            status: e.status,
            note: e.note,
            timestamp: e.timestamp,
            date: f.name.replace("entry-", "").replace("_v001.json", "")
          });
        });
      }
    }

    return allEntries;
  }

  /* -----------------------------
     日付追加（Worker）
     ----------------------------- */
  $("#addDateBtn").on("click", async ()=>{
    const d = $("#dateInput").val();
    if(!d){
      $("#status").text("日付を選択してください").show();
      return;
    }

    const res = await fetch("https://patient-violet-af9d.k-exe-kita.workers.dev",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        project: "twitter",
        type: "dates",
        date: d
      })
    });

    const text = await res.text();
    $("#status").text(text).show();

    renderTable();
  });

  /* -----------------------------
     一覧描画
     ----------------------------- */
  async function renderTable(){

    const datesJson = await loadDates();
    const membersJson = await loadMembers();
    const entries = await loadEntries();

    let html = "<table><tr><th>メンバー</th>";

    datesJson.dates.forEach(d=>{
      html += `<th>${d}</th>`;
    });
    html += "</tr>";

    membersJson.members.forEach(m=>{
      html += `<tr><td>${m.name}</td>`;

      datesJson.dates.forEach(d=>{
        const e = entries.find(x => x.name===m.name && x.date===d);

        if(!e){
          html += "<td>-</td>";
        }else{
          if(e.note){
            html += `<td class="note" title="${e.note}">${e.status}</td>`;
          }else{
            html += `<td>${e.status}</td>`;
          }
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    $("#tableArea").html(html);
  }

  renderTable();

});
</script>

</body>
</html>
