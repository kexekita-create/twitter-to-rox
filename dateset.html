<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>参加確認一覧</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body{background:#1e1e1e;color:#fff;font-family:"Segoe UI";padding:20px}
h2{margin-bottom:20px}
table{border-collapse:collapse;margin-top:20px}
th,td{
  border:1px solid #555;padding:6px 10px;text-align:center;
  min-width:120px;
}
td.note{background:#663300;color:#fff;cursor:pointer}
button{
  margin-top:10px;padding:8px 16px;border:none;border-radius:6px;
  background:#0078ff;color:#fff;font-size:15px;cursor:pointer;
}
#status{margin-top:10px;background:#333;padding:10px;border-radius:6px;display:none}
</style>
</head>

<body>

<h2>参加確認一覧</h2>

<label>日付追加（カレンダー）</label>
<input type="date" id="dateInput">
<button id="addDateBtn">追加</button>

<div id="status"></div>

<div id="tableArea"></div>

<script>
$(async function(){

  const RAW = "https://raw.githubusercontent.com/kexekita-create/twitter-to-rox/main";

  async function fetchRaw(path){
    const res = await fetch(`${RAW}/${path}`);
    if(!res.ok){
      throw new Error("raw fetch error: " + path);
    }
    return await res.json();
  }

  // 最新 members を Worker から取得
  async function loadMembers(){
    const res = await fetch("https://patient-violet-af9d.k-exe-kita.workers.dev",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        project:"twitter",
        type:"list-data"
      })
    });

    if(!res.ok){
      throw new Error("list-data error");
    }

    const json = await res.json();

    const memberFiles = json.files.filter(name =>
      /^members-\d{4}-\d{2}-\d{2}-v\d+\.json$/i.test(name)
    );

    if(memberFiles.length === 0){
      return { members: [] };
    }

    memberFiles.sort((a,b)=> a < b ? 1 : -1);

    return await fetchRaw(`data/${memberFiles[0]}`);
  }

  async function loadDates(){
    return await fetchRaw("data/dates.json");
  }

  // ★ entry 一覧は Worker の list-entry を使う（files.json 不使用）
  async function loadEntries(){

    const res = await fetch("https://patient-violet-af9d.k-exe-kita.workers.dev",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        project:"twitter",
        type:"list-entry"
      })
    });

    if(!res.ok){
      throw new Error("list-entry error");
    }

    const json = await res.json();

    const grouped = {};

    json.files.forEach(name=>{
      const m = name.match(/^entry-(\d{4}-\d{2}-\d{2})_v(\d+)\.json$/);
      if(!m) return;

      const date    = m[1];
      const version = parseInt(m[2],10);

      if(!grouped[date] || grouped[date].version < version){
        grouped[date] = { name, version };
      }
    });

    const all = [];

    for(const date in grouped){
      const j = await fetchRaw(`data/entry/${grouped[date].name}`);

      if(Array.isArray(j.entries)){
        j.entries.forEach(e=>{
          all.push({
            name:      e.name,
            status:    e.status,
            note:      e.note,
            timestamp: e.timestamp,
            date:      date
          });
        });
      }
    }

    return all;
  }

  // 日付追加ボタン
  $("#addDateBtn").on("click", async ()=>{
    const d = $("#dateInput").val();
    if(!d){
      $("#status").text("日付を選択してください").show();
      return;
    }

    try{
      const res = await fetch("https://patient-violet-af9d.k-exe-kita.workers.dev",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          project:"twitter",
          type:"dates",
          date:d
        })
      });

      const text = await res.text();
      $("#status").text(text).show();

      await renderTable();
    }catch(e){
      $("#status").text("エラー: " + e.message).show();
    }
  });

  async function renderTable(){

    const datesJson   = await loadDates();
    const membersJson = await loadMembers();
    const entries     = await loadEntries();

    let html = "<table><tr><th>メンバー</th>";

    datesJson.dates.forEach(d=>{
      html += `<th>${d}</th>`;
    });
    html += "</tr>";

    membersJson.members.forEach(m=>{
      html += `<tr><td>${m.name}</td>`;

      datesJson.dates.forEach(d=>{
        const e = entries.find(x => x.name===m.name && x.date===d);

        if(!e){
          html += "<td>-</td>";
        }else{
          if(e.note){
            html += `<td class="note" title="${e.note}">${e.status}</td>`;
          }else{
            html += `<td>${e.status}</td>`;
          }
        }
      });

      html += "</tr>";
    });

    html += "</table>";

    $("#tableArea").html(html);
  }

  // 初期表示
  try{
    await renderTable();
  }catch(e){
    $("#status").text("初期表示エラー: " + e.message).show();
  }

});
</script>

</body>
</html>
