<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>参加確認一覧</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body{background:#1e1e1e;color:#fff;font-family:"Segoe UI";padding:20px}
h2{margin-bottom:20px}

table{border-collapse:collapse;margin-top:20px;width:100%}

/* 列幅調整 */
th,td{
  border:1px solid #555;
  padding:6px 10px;
  text-align:center;
  min-width:140px;
}

/* ヘッダだけ背景色変更 */
thead th{
  background:#2a2a2a;
  color:#fff;
}

td.note{
  background:#663300;
  color:#fff;
  cursor:pointer;
}

/* 備考ポップアップ */
.note-popup {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  background: #000;
  color: #fff;
  padding: 16px;
  border: 1px solid #666;
  border-radius: 8px;
  z-index: 9999;
  max-width: 80%;
  max-height: 60%;
  overflow-y: auto;
  box-shadow: 0 0 12px rgba(0,0,0,0.7);
}
.note-close {
  text-align: right;
  margin-bottom: 8px;
  font-size: 14px;
  cursor: pointer;
  color: #ccc;
}
</style>
</head>

<body>

<h2>参加確認一覧</h2>

<label>日付追加（カレンダー）</label>
<input type="date" id="dateInput">
<button id="addDateBtn">追加</button>

<div id="status"></div>
<div id="tableArea"></div>

<script>
function showNotePopup(note){
  const div = document.createElement("div");
  div.className = "note-popup";
  div.innerHTML = `
    <div class="note-close">✕ 閉じる</div>
    <div>${note}</div>
  `;
  div.querySelector(".note-close").addEventListener("click", () => div.remove());
  document.body.appendChild(div);
}

$(async function(){

  const RAW = "https://raw.githubusercontent.com/kexekita-create/twitter-to-rox/main";

  async function fetchRaw(path){
    const res = await fetch(`${RAW}/${path}`);
    if(!res.ok) throw new Error("raw fetch error: " + path);
    return await res.json();
  }

  async function loadMembers(){
    const res = await fetch("https://patient-violet-af9d.k-exe-kita.workers.dev",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ project:"twitter", type:"list-data" })
    });
    const json = await res.json();
    const memberFiles = json.files.filter(name =>
      /^members-\d{4}-\d{2}-\d{2}-v\d+\.json$/i.test(name)
    );
    memberFiles.sort((a,b)=> a < b ? 1 : -1);
    return await fetchRaw(`data/${memberFiles[0]}`);
  }

  async function loadDates(){
    return await fetchRaw("data/dates.json");
  }

  async function loadEntries(){
    const res = await fetch("https://patient-violet-af9d.k-exe-kita.workers.dev",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ project:"twitter", type:"list-entry" })
    });
    const json = await res.json();

    const grouped = {};
    json.files.forEach(name=>{
      const m = name.match(/^entry-(\d{4}-\d{2}-\d{2})_v(\d+)\.json$/);
      if(!m) return;
      const date = m[1];
      const version = parseInt(m[2],10);
      if(!grouped[date] || grouped[date].version < version){
        grouped[date] = { name, version };
      }
    });

    const all = [];
    for(const date in grouped){
      const j = await fetchRaw(`data/entry/${grouped[date].name}`);
      if(Array.isArray(j.entries)){
        j.entries.forEach(e=>{
          all.push({
            name: e.name,
            status: e.status,
            note: e.note,
            timestamp: e.timestamp,
            date: date
          });
        });
      }
    }
    return all;
  }

  $("#addDateBtn").on("click", async ()=>{
    const d = $("#dateInput").val();
    if(!d){
      $("#status").text("日付を選択してください").show();
      return;
    }

    try{
      const res = await fetch("https://patient-violet-af9d.k-exe-kita.workers.dev",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ project:"twitter", type:"dates", date:d })
      });
      const text = await res.text();
      $("#status").text(text).show();
      await renderTable();
    }catch(e){
      $("#status").text("エラー: " + e.message).show();
    }
  });

  async function renderTable(){

    const datesJson   = await loadDates();
    const membersJson = await loadMembers();
    const entries     = await loadEntries();

    /* ★ 日付ごとの小計（未記入＝ "-", "", null, undefined, キーなし） */
    let dailySummary = {};
    datesJson.dates.forEach(d=>{
      dailySummary[d] = { sanka:0, fusanka:0, mikinyu:0 };
    });

    entries.forEach(e=>{
      if(!e.name || e.name.trim()==="") return;
      if(!datesJson.dates.includes(e.date)) return;

      // ★ status が存在しないケースも拾う
      const raw = e.status;
      const s = (raw === null || raw === undefined) ? "" : String(raw).trim();

      if(s === "参加") {
        dailySummary[e.date].sanka++;
      } else if(s === "不参加") {
        dailySummary[e.date].fusanka++;
      } else if(s === "-" || s === "") {
        dailySummary[e.date].mikinyu++;
      }
    });

    /* ★ テーブル生成（ヘッダに小計） */
    let html = "<table><thead>";

    html += "<tr><th>参加計</th>";
    datesJson.dates.forEach(d=>{
      html += `<th>${dailySummary[d].sanka}人</th>`;
    });
    html += "</tr>";

    html += "<tr><th>不参加計</th>";
    datesJson.dates.forEach(d=>{
      html += `<th>${dailySummary[d].fusanka}人</th>`;
    });
    html += "</tr>";

    html += "<tr><th>未記入計</th>";
    datesJson.dates.forEach(d=>{
      html += `<th>${dailySummary[d].mikinyu}人</th>`;
    });
    html += "</tr>";

    html += "<tr><th>メンバー</th>";
    datesJson.dates.forEach(d=>{
      html += `<th>${d}</th>`;
    });
    html += "</tr>";

    html += "</thead><tbody>";

    /* ★ メンバー行 */
    membersJson.members.forEach(m=>{
      if(!m.name || m.name.trim()==="") return;

      html += `<tr><td>${m.name}</td>`;

      datesJson.dates.forEach(d=>{
        const e = entries.find(x => x.name===m.name && x.date===d);

        if(!e){
          html += "<td>-</td>";
        }else{
          const raw = e.status;
          const s = (raw === null || raw === undefined) ? "-" : raw;

          if(e.note){
            html += `<td class="note" data-note="${e.note}">${s}</td>`;
          }else{
            html += `<td>${s}</td>`;
          }
        }
      });

      html += "</tr>";
    });

    html += "</tbody></table>";

    $("#tableArea").html(html);

    /* ★ 備考ポップアップ */
    $("#tableArea .note").on("click", function(){
      const note = $(this).data("note");
      if(note) showNotePopup(note);
    });
  }

  await renderTable();

});
</script>

</body>
</html>
