<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>出欠集計</title>

<style>
  body {
    font-family: system-ui, sans-serif;
    padding: 16px;
    background: #202020;
    color: #f0f0f0;
  }

  .summary {
    margin-bottom: 12px;
    background: #444;
    padding: 8px 12px;
    border-radius: 4px;
  }
  .summary-row {
    display: flex;
    gap: 16px;
    margin: 2px 0;
  }
  .summary-label {
    display: inline-block;
    min-width: 80px;
  }

  table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 8px;
    background: #303030;
  }
  thead th {
    background: #000;
    color: #fff;
    padding: 6px 8px;
    border: 1px solid #555;
    text-align: center;
  }
  tbody td {
    padding: 4px 8px;
    border: 1px solid #555;
    text-align: center;
    cursor: pointer; /* ← 備考タップ対応 */
  }
  tbody td:first-child {
    text-align: left;
    background: #111;
    cursor: default;
  }

  /* 備考ポップアップ */
  .note-popup {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: #000;
    color: #fff;
    padding: 16px;
    border: 1px solid #666;
    border-radius: 8px;
    z-index: 9999;
    max-width: 80%;
    max-height: 60%;
    overflow-y: auto; /* ← 長文スクロール */
    box-shadow: 0 0 12px rgba(0,0,0,0.7);
  }
  .note-close {
    text-align: right;
    margin-bottom: 8px;
    font-size: 14px;
    cursor: pointer;
    color: #ccc;
  }
</style>
</head>

<body>

<h1>出欠集計</h1>

<div class="summary">
  <div class="summary-row">
    <span class="summary-label">参加計</span>
    <span id="sum-sanka">0</span>人
  </div>
  <div class="summary-row">
    <span class="summary-label">不参加計</span>
    <span id="sum-fusanka">0</span>人
  </div>
  <div class="summary-row">
    <span class="summary-label">未記入計</span>
    <span id="sum-mikinyu">0</span>人
  </div>
</div>

<table>
  <thead>
    <tr id="header-row">
      <th>メンバー</th>
    </tr>
  </thead>
  <tbody id="entry-body"></tbody>
</table>

<script>
  /* 備考ポップアップ */
  function showNotePopup(note) {
    const div = document.createElement("div");
    div.className = "note-popup";

    div.innerHTML = `
      <div class="note-close">✕ 閉じる</div>
      <div>${note}</div>
    `;

    div.querySelector(".note-close").addEventListener("click", () => {
      div.remove();
    });

    document.body.appendChild(div);
  }

  /* 日付取得（?dates=2026-08-05,2026-08-08） */
  function getTargetDates() {
    const params = new URLSearchParams(location.search);
    const raw = params.get("dates");
    if (!raw) return [];
    return raw.split(",").map(d => d.trim()).filter(d => d);
  }

  /* 最新 entry ファイルを取得する（vXXX 自動判定） */
  async function loadLatestEntry(date) {
    const listUrl = `https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data/entry`;
    const listRes = await fetch(listUrl);
    const list = await listRes.json();

    const files = list
      .filter(f => f.name.startsWith(`entry-${date}_v`) && f.name.endsWith(".json"))
      .sort((a, b) => {
        const av = parseInt(a.name.match(/_v(\d+)\.json$/)[1]);
        const bv = parseInt(b.name.match(/_v(\d+)\.json$/)[1]);
        return bv - av;
      });

    if (files.length === 0) return [];

    const rawRes = await fetch(files[0].download_url);
    const json = await rawRes.json();
    return json.entries || [];
  }

  async function main() {
    const dates = getTargetDates();
    if (dates.length === 0) return;

    /* 日付ヘッダー生成 */
    const headerRow = document.getElementById("header-row");
    dates.forEach(date => {
      const th = document.createElement("th");
      th.textContent = date.replace(/-/g, "/");
      headerRow.appendChild(th);
    });

    /* 全日付の entry を読み込む */
    const entriesByDate = {};
    for (const date of dates) {
      entriesByDate[date] = await loadLatestEntry(date);
    }

    /* メンバー一覧（空白除外） */
    const memberSet = new Set();
    for (const date of dates) {
      for (const e of entriesByDate[date]) {
        if (!e.name || e.name.trim() === "") continue;
        memberSet.add(e.name.trim());
      }
    }
    const members = Array.from(memberSet);

    /* 集計 */
    let sumSanka = 0;
    let sumFusanka = 0;
    let sumMikinyu = 0;

    for (const date of dates) {
      for (const e of entriesByDate[date]) {
        if (!e.name || e.name.trim() === "") continue;
        const status = e.status || "";
        if (status === "参加") sumSanka++;
        else if (status === "不参加") sumFusanka++;
        else sumMikinyu++;
      }
    }

    document.getElementById("sum-sanka").textContent = sumSanka;
    document.getElementById("sum-fusanka").textContent = sumFusanka;
    document.getElementById("sum-mikinyu").textContent = sumMikinyu;

    /* クロス表生成 */
    const tbody = document.getElementById("entry-body");
    tbody.innerHTML = "";

    members.forEach(name => {
      const tr = document.createElement("tr");

      const tdName = document.createElement("td");
      tdName.textContent = name;
      tr.appendChild(tdName);

      dates.forEach(date => {
        const td = document.createElement("td");

        const list = entriesByDate[date].filter(e => (e.name || "").trim() === name);
        if (list.length === 0) {
          td.textContent = "";
        } else {
          const e = list[list.length - 1];
          const status = e.status || "未記入";
          td.textContent = status;

          /* 備考タップで開く */
          if (e.note && e.note.trim() !== "") {
            td.addEventListener("click", () => {
              showNotePopup(e.note);
            });
          }
        }

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });
  }

  main();
</script>

</body>
</html>
