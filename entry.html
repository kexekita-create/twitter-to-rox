<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>参加連絡フォーム</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body{background:#1e1e1e;color:#fff;font-family:"Segoe UI";padding:20px}
h2{margin-bottom:20px}
label{display:block;margin-top:15px;font-size:16px}
select,input,textarea{
  width:300px;padding:8px;border-radius:6px;border:1px solid #666;
  background:#2a2a2a;color:#fff;font-size:15px;
}
button{
  margin-top:20px;padding:10px 20px;border:none;border-radius:6px;
  background:#0078ff;color:#fff;font-size:16px;cursor:pointer;
}
#status{margin-top:20px;background:#333;padding:10px;border-radius:6px;display:none}
</style>
</head>

<body>

<h2>参加連絡フォーム</h2>

<label>参加者</label>
<select id="memberSelect"></select>

<label>日付</label>
<select id="dateSelect"></select>

<label>参加可否</label>
<select id="statusSelect">
  <option value="可">可</option>
  <option value="否">否</option>
</select>

<label>備考</label>
<textarea id="noteInput" rows="4"></textarea>

<button id="sendBtn">送信</button>

<div id="status"></div>

<script>
$(async function(){

  /* -----------------------------
     最新 members を GitHub API で読み込む（高速）
     ----------------------------- */
  async function loadMembers(){
    const apiUrl =
      "https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data";

    const files = await (await fetch(apiUrl)).json();

    const memberFiles = files.filter(f => /^members-.*\.json$/i.test(f.name));

    memberFiles.sort((a,b)=> a.name < b.name ? 1 : -1);

    const latest = memberFiles[0];

    const info = await (await fetch(
      `https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data/${latest.name}`
    )).json();

    return await (await fetch(info.download_url)).json();
  }

  /* -----------------------------
     参加者読み込み
     ----------------------------- */
  const memberJson = await loadMembers();

  $("#memberSelect").append(
    memberJson.members.map(m => `<option value="${m.name}">${m.name}（${m.job}）</option>`)
  );

  /* -----------------------------
     日付読み込み（GitHub API）
     ----------------------------- */
  async function loadDates(){
    const info = await (await fetch(
      "https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data/dates.json"
    )).json();

    return await (await fetch(info.download_url)).json();
  }

  const datesJson = await loadDates();

  datesJson.dates.forEach(d=>{
    $("#dateSelect").append(`<option value="${d}">${d}</option>`);
  });

  /* -----------------------------
     送信処理（Worker に entry を送る）
     ----------------------------- */
  $("#sendBtn").on("click", async ()=>{

    const name = $("#memberSelect").val();
    const date = $("#dateSelect").val();
    const status = $("#statusSelect").val();
    const note = $("#noteInput").val();

    const payload = {
      project: "twitter",
      type: "entry",
      name,
      date,
      status,
      note,
      timestamp: new Date().toISOString()
    };

    const res = await fetch("https://patient-violet-af9d.k-exe-kita.workers.dev",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });

    const text = await res.text();
    $("#status").text(text).show();
  });

});
</script>

</body>
</html>
