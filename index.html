<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>参加者一覧</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
  body {
    font-family: "Segoe UI", sans-serif;
    background: #1e1e1e;
    color: #e0e0e0;
    margin: 0;
    padding: 20px;
  }
  h2 { margin-bottom: 10px; color: #fff; }
  #headerArea, #loadArea {
    background: #2a2a2a;
    padding: 12px;
    border-radius: 6px;
    width: 350px;
    margin-bottom: 15px;
    border: 1px solid #444;
  }
  input[type="date"], input[type="text"], select {
    background: #333;
    color: #fff;
    border: 1px solid #555;
    padding: 6px;
    border-radius: 4px;
  }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th { background: #333; padding: 8px; border-bottom: 2px solid #555; }
  td { padding: 6px; border-bottom: 1px solid #444; }
  tr:hover { background: #2f2f2f; transition: 0.2s; }
  #saveBtn {
    position: fixed; top: 20px; right: 20px;
    background: #0078ff; color: white;
    padding: 10px 18px; border: none; border-radius: 6px;
    cursor: pointer; font-weight: bold; box-shadow: 0 0 10px #000;
  }
  #deleteBtn { background: #ff4444; color: white; padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
  #status {
    position: fixed; top: 60px; right: 20px;
    background: #2a2a2a; color: #fff;
    padding: 6px 10px; border-radius: 4px; font-size: 12px; display: none;
  }
</style>
</head>

<body>

<h2>参加者一覧（1～100）</h2>

<button id="saveBtn">保存</button>
<div id="status"></div>

<div id="loadArea">
  <label>保存データを読み込む：</label><br>
  <select id="loadSelect" style="margin-top:5px; width:200px;"></select>
  <button id="loadBtn">読み込み</button>
  <button id="deleteBtn">削除</button>
</div>

<div id="headerArea">
  <label>日付を選択：</label>
  <input type="date" id="eventDate">
</div>

<table id="memberTable">
  <thead>
    <tr>
      <th>No</th>
      <th>名前</th>
      <th>職業</th>
      <th>参加（可/否）</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
$(function () {

  const jobs = [
    "ルーンナイト","ロイヤルガード","ウォーロック","ソーサラー","アークビショップ",
    "修羅","レンジャー","ミンストレル","ワンダラー","ギロチンクロス",
    "シャドウチェイサー","ジェネティック","メカニック","ハイパーノービス"
  ];

  const $tbody = $("#memberTable tbody");
  for (let i = 1; i <= 100; i++) {
    const $tr = $("<tr></tr>");
    $tr.append(`<td>${i}</td>`);
    $tr.append(`<td><input type="text" name="name_${i}"></td>`);

    const jobSel = $("<select>").attr("name", "job_" + i);
    jobs.forEach(j => jobSel.append(`<option value="${j}">${j}</option>`));
    $tr.append($("<td>").append(jobSel));

    const joinSel = $(`<select name="join_${i}">
      <option value="可">可</option>
      <option value="否">否</option>
    </select>`);
    $tr.append($("<td>").append(joinSel));

    $tbody.append($tr);
  }

  function showStatus(msg, error) {
    $("#status")
      .text(msg)
      .css("background", error ? "#a33" : "#2a2a2a")
      .fadeIn(150);
    setTimeout(() => $("#status").fadeOut(300), 3000);
  }

  async function saveToGitHub(data) {
    const res = await fetch("https://patient-violet-af9d.k-exe-kita.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(await res.text());
  }

  $("#saveBtn").on("click", async function () {
    const data = {
      type: "members",
      date: $("#eventDate").val(),
      members: []
    };

    $("#memberTable tbody tr").each(function () {
      data.members.push({
        no: $(this).find("td:eq(0)").text(),
        name: $(this).find("input").val(),
        job: $(this).find("select[name^='job']").val(),
        join: $(this).find("select[name^='join']").val()
      });
    });

    showStatus("保存中...");

    try {
      await saveToGitHub(data);
      showStatus("保存完了");
    } catch (e) {
      showStatus("保存失敗: " + e.message, true);
    }
  });

  async function loadFileList() {
    const res = await fetch("https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data");
    const files = await res.json();

    $("#loadSelect").empty();
    files
      .filter(f => f.name.startsWith("members-"))
      .forEach(f => $("#loadSelect").append(`<option>${f.name}</option>`));
  }

  async function loadSelectedFile() {
    const file = $("#loadSelect").val();
    const res = await fetch(`https://raw.githubusercontent.com/kexekita-create/twitter-to-rox/main/data/${file}`);
    const json = await res.json();

    $("#eventDate").val(json.date);

    json.members.forEach((m, i) => {
      const row = $("#memberTable tbody tr").eq(i);
      row.find("input").val(m.name);
      row.find("select[name^='job']").val(m.job);
      row.find("select[name^='join']").val(m.join);
    });

    showStatus("読み込み完了");
  }

  $("#loadBtn").on("click", loadSelectedFile);

  // ▼ 削除機能（動作保証版）
  $("#deleteBtn").on("click", async function () {
    const file = $("#loadSelect").val();
    if (!file) return showStatus("削除対象がありません", true);

    if (!confirm(file + " を削除しますか？")) return;

    try {
      const res = await fetch("https://patient-violet-af9d.k-exe-kita.workers.dev", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          type: "delete",
          filename: file
        })
      });

      const text = await res.text();
      showStatus(text);

      await loadFileList();
    } catch (e) {
      showStatus("削除失敗: " + e.message, true);
    }
  });

  loadFileList();

});
</script>

</body>
</html>
