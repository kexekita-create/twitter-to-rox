<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>参加者一覧</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
  body {
    font-family: "Segoe UI", sans-serif;
    background: #1e1e1e;
    color: #e0e0e0;
    margin: 0;
    padding: 20px;
  }
  h2 { margin-bottom: 10px; color: #fff; }
  #headerArea, #loadArea {
    background: #2a2a2a;
    padding: 12px;
    border-radius: 6px;
    width: 350px;
    margin-bottom: 15px;
    border: 1px solid #444;
  }
  input[type="date"], input[type="text"], select {
    background: #333;
    color: #fff;
    border: 1px solid #555;
    padding: 6px;
    border-radius: 4px;
  }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th { background: #333; padding: 8px; border-bottom: 2px solid #555; }
  td { padding: 6px; border-bottom: 1px solid #444; }
  tr:hover { background: #2f2f2f; transition: 0.2s; }
  #status {
    position: fixed; top: 20px; right: 20px;
    background: #2a2a2a; color: #fff;
    padding: 6px 10px; border-radius: 4px; font-size: 12px; display: none;
  }
  button {
    padding: 8px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    margin-right: 6px;
    margin-top: 6px;
  }
  #localSaveBtn { background: #0078ff; color: #fff; }
  #serverSaveBtn { background: #00aa88; color: #fff; }
  #localLoadBtn { background: #888; color: #fff; }
  #serverLoadBtn { background: #555; color: #fff; }
  #deleteBtn { background: #ff4444; color: #fff; }
</style>
</head>

<body>

<h2>参加者一覧（1～100）</h2>

<div id="status"></div>

<div id="loadArea">
  <label>サーバーの保存データ：</label><br>
  <select id="loadSelect" style="margin-top:5px; width:200px;"></select>
  <button id="serverLoadBtn">サーバーから読み込み</button>
  <button id="deleteBtn">サーバーから削除</button>

  <br><br>

  <button id="localLoadBtn">ローカルから読み込み</button>
  <input type="file" id="localLoadInput" accept="application/json" style="display:none;">
</div>

<div id="headerArea">
  <label>日付を選択：</label>
  <input type="date" id="eventDate">
</div>

<button id="localSaveBtn">ローカル保存</button>
<button id="serverSaveBtn">サーバーへ保存</button>

<table id="memberTable">
  <thead>
    <tr>
      <th>No</th>
      <th>名前</th>
      <th>職業</th>
      <th>参加（可/否）</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
$(function () {

  const jobs = [
    "ルーンナイト","ロイヤルガード","ウォーロック","ソーサラー","アークビショップ",
    "修羅","レンジャー","ミンストレル","ワンダラー","ギロチンクロス",
    "シャドウチェイサー","ジェネティック","メカニック","ハイパーノービス"
  ];

  const $tbody = $("#memberTable tbody");
  for (let i = 1; i <= 100; i++) {
    const $tr = $("<tr></tr>");
    $tr.append(`<td>${i}</td>`);
    $tr.append(`<td><input type="text" name="name_${i}"></td>`);

    const jobSel = $("<select>").attr("name", "job_" + i);
    jobs.forEach(j => jobSel.append(`<option value="${j}">${j}</option>`));
    $tr.append($("<td>").append(jobSel));

    const joinSel = $(`<select name="join_${i}">
      <option value="可">可</option>
      <option value="否">否</option>
    </select>`);
    $tr.append($("<td>").append(joinSel));

    $tbody.append($tr);
  }

  function showStatus(msg, error) {
    $("#status")
      .text(msg)
      .css("background", error ? "#a33" : "#2a2a2a")
      .fadeIn(150);
    setTimeout(() => $("#status").fadeOut(300), 3000);
  }

  function collectMembersData() {
    const data = {
      type: "members",
      date: $("#eventDate").val(),
      members: []
    };

    $("#memberTable tbody tr").each(function () {
      data.members.push({
        no: $(this).find("td:eq(0)").text(),
        name: $(this).find("input").val(),
        job: $(this).find("select[name^='job']").val(),
        join: $(this).find("select[name^='join']").val()
      });
    });

    return data;
  }

  function downloadLocal(filename, json) {
    const blob = new Blob([JSON.stringify(json, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();

    URL.revokeObjectURL(url);
  }

  $("#localSaveBtn").on("click", function () {
    const data = collectMembersData();
    const filename = `members-${data.date}.json`;

    downloadLocal(filename, data);
    showStatus("ローカルに保存しました");
  });

  $("#localLoadBtn").on("click", function () {
    $("#localLoadInput").click();
  });

  $("#localLoadInput").on("change", function (e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function () {
      const json = JSON.parse(reader.result);
      loadMembersFromJson(json);
      showStatus("ローカルファイルを読み込みました");
    };
    reader.readAsText(file);
  });

  function loadMembersFromJson(json) {
    $("#eventDate").val(json.date);

    json.members.forEach((m, i) => {
      const row = $("#memberTable tbody tr").eq(i);
      row.find("input").val(m.name);
      row.find("select[name^='job']").val(m.job);
      row.find("select[name^='join']").val(m.join);
    });
  }

  async function loadFileList() {
    const res = await fetch("https://api.github.com/repos/kexekita-create/twitter-to-rox/contents/data");
    const files = await res.json();

    $("#loadSelect").empty();
    files
      .filter(f => f.name.startsWith("members-"))
      .forEach(f => $("#loadSelect").append(`<option>${f.name}</option>`));
  }

  $("#serverLoadBtn").on("click", async function () {
    const file = $("#loadSelect").val();
    const res = await fetch(`https://raw.githubusercontent.com/kexekita-create/twitter-to-rox/main/data/${file}`);
    const json = await res.json();

    loadMembersFromJson(json);
    showStatus("サーバーから読み込みました");
  });

  $("#serverSaveBtn").on("click", async function () {
    const data = collectMembersData();

    try {
      const res = await fetch("https://patient-violet-af9d.k-exe-kita.workers.dev", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      showStatus(await res.text());
      loadFileList();
    } catch (e) {
      showStatus("サーバー保存失敗: " + e.message, true);
    }
  });

  $("#deleteBtn").on("click", async function () {
    const file = $("#loadSelect").val();
    if (!file) return showStatus("削除対象がありません", true);

    if (!confirm(file + " を削除しますか？\n削除前にバックアップを保存します。")) return;

    try {
      const res = await fetch(`https://raw.githubusercontent.com/kexekita-create/twitter-to-rox/main/data/${file}`);
      const json = await res.json();

      downloadLocal("backup-" + file, json);
      showStatus("バックアップ保存完了");
    } catch (e) {
      return showStatus("バックアップ取得失敗: " + e.message, true);
    }

    try {
      const res = await fetch("https://patient-violet-af9d.k-exe-kita.workers.dev", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          type: "delete",
          filename: file
        })
      });

      showStatus(await res.text());
      loadFileList();
    } catch (e) {
      showStatus("削除失敗: " + e.message, true);
    }
  });

  loadFileList();

});
</script>

</body>
</html>
