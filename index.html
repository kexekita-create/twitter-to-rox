<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>参加者一覧</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
  body {
    font-family: "Segoe UI", sans-serif;
    background: #1e1e1e;
    color: #e0e0e0;
    margin: 0;
    padding: 20px;
  }
  h2 {
    margin-bottom: 10px;
    color: #fff;
  }
  #headerArea {
    background: #2a2a2a;
    padding: 12px;
    border-radius: 6px;
    width: 320px;
    margin-bottom: 15px;
    border: 1px solid #444;
  }
  input[type="date"] {
    background: #333;
    color: #fff;
    border: 1px solid #555;
    padding: 6px;
    border-radius: 4px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }
  th {
    background: #333;
    padding: 8px;
    border-bottom: 2px solid #555;
  }
  td {
    padding: 6px;
    border-bottom: 1px solid #444;
  }
  input[type="text"], select {
    width: 100%;
    padding: 5px;
    background: #2a2a2a;
    color: #fff;
    border: 1px solid #555;
    border-radius: 4px;
  }
  tr:hover {
    background: #2f2f2f;
    transition: 0.2s;
  }
  #saveBtn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #0078ff;
    color: white;
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 0 10px #000;
  }
  #saveBtn:hover {
    background: #3399ff;
  }
  #status {
    position: fixed;
    top: 60px;
    right: 20px;
    background: #2a2a2a;
    color: #fff;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 12px;
    display: none;
  }
</style>
</head>

<body>

<h2>参加者一覧（1～100）</h2>

<button id="saveBtn">保存</button>
<div id="status"></div>

<div id="headerArea">
  <label>日付を選択：</label>
  <input type="date" id="eventDate">
</div>

<table id="memberTable">
  <thead>
    <tr>
      <th>No</th>
      <th>名前</th>
      <th>職業</th>
      <th>参加（可/否）</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
$(function () {
  const jobs = [
    "ルーンナイト","3ロイヤルガード","ウォーロック","ソーサラー","アークビショップ",
    "修羅","レンジャー","ミンストレル","ワンダラー","ギロチンクロス",
    "シャドウチェイサー","ジェネティック","メカニック","ハイパーノービス"
  ];

  const $tbody = $("#memberTable tbody");

  for (let i = 1; i <= 100; i++) {
    const $tr = $("<tr></tr>");
    $tr.append($("<td></td>").text(i));

    const $name = $("<input>").attr("type", "text").attr("name", "name_" + i);
    $tr.append($("<td></td>").append($name));

    const $job = $("<select></select>").attr("name", "job_" + i);
    jobs.forEach(j => $job.append($("<option></option>").val(j).text(j)));
    $tr.append($("<td></td>").append($job));

    const $join = $("<select></select>").attr("name", "join_" + i);
    $join.append("<option value='可'>可</option>");
    $join.append("<option value='否'>否</option>");
    $tr.append($("<td></td>").append($join));

    $tbody.append($tr);
  }

  function showStatus(msg, isError) {
    const $s = $("#status");
    $s.text(msg)
      .css("background", isError ? "#a33" : "#2a2a2a")
      .fadeIn(150);
    setTimeout(() => $s.fadeOut(300), 3000);
  }

  async function saveToGitHub(data) {
    const owner = "kexekita-create";   // ←自分のGitHubユーザー名
    const repo  = "twitter-to-rox";       // ←リポジトリ名

    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/issues`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        title: "save-members-" + new Date().toISOString(),
        body: JSON.stringify(data)
      })
    });

    if (!res.ok) {
      throw new Error("GitHub API error: " + res.status);
    }
  }

  $("#saveBtn").on("click", async function () {
    const data = {
      date: $("#eventDate").val(),
      members: []
    };

    $("#memberTable tbody tr").each(function () {
      const row = {
        no: $(this).find("td:eq(0)").text(),
        name: $(this).find("input").val(),
        job: $(this).find("select[name^='job']").val(),
        join: $(this).find("select[name^='join']").val()
      };
      data.members.push(row);
    });

    showStatus("GitHubに送信中...", false);

    try {
      await saveToGitHub(data);
      showStatus("保存リクエスト送信完了（Actionsで反映されます）", false);
    } catch (e) {
      console.error(e);
      showStatus("保存に失敗しました: " + e.message, true);
    }
  });
});
</script>

</body>
</html>
